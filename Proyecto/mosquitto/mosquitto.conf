# =================================================================
# Configuración del Broker MQTT Mosquitto
# =================================================================

# Puerto estándar para MQTT
listener 1883 0.0.0.0

# Puerto para WebSockets (útil para dashboards web)
listener 9001 0.0.0.0
protocol websockets

# Deshabilitar conexiones anónimas por seguridad
allow_anonymous false

# Ruta al archivo de contraseñas (dentro del contenedor)
password_file /mosquitto/config/passwd

# =================================================================
# Persistencia y Logs
# =================================================================
persistence true
persistence_location /mosquitto/data/

# Enviar logs tanto a archivo como a la salida estándar (para docker logs)
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Nivel de detalle de los logs
log_type error
log_type warning
log_type notice
log_type information
